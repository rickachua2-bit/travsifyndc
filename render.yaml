services:
  - type: web
    name: travsify-ndc
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - fromGroup: travsify-config

envVarGroups:
  - name: travsify-config
    envVars:
      - key: SUPABASE_URL
      - key: SUPABASE_PUBLISHABLE_KEY
      - key: VITE_SUPABASE_PROJECT_ID
      - key: VITE_SUPABASE_URL
        fromEnvVar: SUPABASE_URL
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        fromEnvVar: SUPABASE_PUBLISHABLE_KEY
